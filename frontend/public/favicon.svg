<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ArguMind">
  <defs>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4DDA0"/>
      <stop offset="55%" stop-color="#E7C46A"/>
      <stop offset="100%" stop-color="#B9933F"/>
    </radialGradient>
    <linearGradient id="seam" x1="32" y1="6" x2="32" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2FE3C2" stop-opacity="0"/>
      <stop offset="22%" stop-color="#2FE3C2"/>
      <stop offset="50%" stop-color="#E7C46A"/>
      <stop offset="78%" stop-color="#FF7A4D"/>
      <stop offset="100%" stop-color="#FF7A4D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- arena tile -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="#0C0F16"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="14.25" fill="none" stroke="#2A3346" stroke-width="1.5"/>

  <!-- central seam (the signature fault line) -->
  <rect x="30.6" y="8" width="2.8" height="48" rx="1.4" fill="url(#seam)"/>

  <!-- two poles converging on the verdict: 찬성 (cyan, left) / 반대 (ember, right) -->
  <path d="M15 17 L27 32 L15 47" fill="none" stroke="#2FE3C2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M49 17 L37 32 L49 47" fill="none" stroke="#FF7A4D" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- the judge's verdict node -->
  <circle cx="32" cy="32" r="13" fill="url(#node)" opacity="0.22"/>
  <path d="M32 22 L42 32 L32 42 L22 32 Z" fill="url(#node)"/>
  <path d="M32 22 L42 32 L32 42 L22 32 Z" fill="none" stroke="#0C0F16" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
